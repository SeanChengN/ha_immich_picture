name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m compileall -q custom_components
      - run: python -m unittest discover -s tests -v
      - run: |
          node -e "const fs=require('fs'); for (const f of ['custom_components/immich_picture/manifest.json','custom_components/immich_picture/translations/en.json','custom_components/immich_picture/translations/zh-Hans.json','hacs.json']) JSON.parse(fs.readFileSync(f)); const html=fs.readFileSync('custom_components/immich_picture/player.html','utf8'); new Function(html.match(/<script>([\s\S]*?)<\/script>/)[1]);"
      - run: git diff --check
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
